<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>猫咪探索地图</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <div id="map"></div>
    <div id="hud">
      <div class="title">猫咪探索地图</div>
      <div class="sub">一起探索世界上的猫咪，看看它们从哪里来。</div>
      <div class="hint">拖动地图去旅行，点一点猫咪卡片，就能认识不同品种的小伙伴。</div>
      <div class="action-row">
        <button id="syncBtn" class="sync-btn" type="button">探索</button>
      </div>
      <div id="status" class="status">正在准备猫咪足迹…</div>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
  <script src="./app.js"></script>
</body>
<style>
</style>
</html>
